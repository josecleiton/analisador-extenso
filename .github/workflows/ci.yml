name: CI

on:
  push:
    branches: [master, "refactor/**"]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        cc: [gcc, clang]
    env:
      CC: ${{ matrix.cc }}
    steps:
      - uses: actions/checkout@v4

      - name: Compiler version
        run: ${{ matrix.cc }} --version

      - name: Build (release)
        run: make

      - name: Run tests (golden + cases + error recovery)
        run: make test

      - name: Build (debug)
        run: make debug
